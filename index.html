<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>微型帝国时代：口袋战役 (Mini AOE)</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'PingFang SC', system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #1e293b;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* 顶部资源栏 */
        header {
            background: #0f172a;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #334155;
            z-index: 10;
        }
        .res-group {
            display: flex;
            gap: 16px;
        }
        .res-item {
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .res-food { color: #f59e0b; }
        .res-wood { color: #10b981; }
        .res-gold { color: #eab308; }

        /* 核心游戏区域 */
        main {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
            background-color: #15803d; 
        }

        /* 绝对定位容纳层：彻底根治Canvas尺寸塌陷 */
        .canvas-container {
            flex: 1;
            position: relative;
            height: 100%;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #15803d; /* 深绿战场 */
            cursor: pointer;
        }

        /* 右侧操控指令面板 */
        .control-panel {
            width: 160px;
            background: rgba(15, 23, 42, 0.95);
            border-left: 2px solid #334155;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 5;
        }
        @media (max-width: 600px) {
            .control-panel {
                width: 100%;
                height: 75px;
                position: absolute;
                bottom: 0;
                left: 0;
                flex-direction: row;
                border-left: none;
                border-top: 2px solid #334155;
                padding: 8px;
                justify-content: space-around;
                align-items: center;
            }
            .canvas-container {
                margin-bottom: 75px; /* 为底部留出操控空间 */
            }
        }

        .cmd-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
        }
        .cmd-btn:active { background: #1d4ed8; }
        .cmd-btn:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }
        .btn-build { background: #7c3aed; }
        .btn-build:active { background: #6d28d9; }

        /* 状态提示 */
        .status-toast {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            pointer-events: none;
            color: #67e8f9;
            z-index: 100;
            display: none;
            border: 1px solid #334155;
        }
    </style>
</head>
<body>

    <header>
        <div style="font-size: 14px; font-weight: bold; color: #38bdf8;">微型帝国时代 v1.2.1 Fixed</div>
        <div class="res-group">
            <span class="res-item res-food">🌾 食物: <span id="r-food">200</span></span>
            <span class="res-item res-wood">🪵 木材: <span id="r-wood">150</span></span>
            <span class="res-item res-gold">🪙 黄金: <span id="r-gold">50</span></span>
        </div>
        <button onclick="toggleFullScreen()" style="background:#334155; border:none; color:white; padding:4px 8px; font-size:11px; border-radius:4px;">📱全屏</button>
    </header>

    <main>
        <div class="status-toast" id="toast">请在战场草地上点击位置安放建筑...</div>
        
        <div class="canvas-container" id="canvasBox">
            <canvas id="gameCanvas"></canvas>
        </div>
        
        <div class="control-panel">
            <button class="cmd-btn" id="btn-spawn-v" onclick="spawnVillager()">训练村民 (🌾50)</button>
            <button class="cmd-btn btn-build" id="btn-mode-b" onclick="enterBuildMode()">建造兵营 (🪵100)</button>
            <button class="cmd-btn" id="btn-spawn-s" onclick="spawnSoldier()" disabled>训练步兵 (🌾60 🪙20)</button>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const canvasBox = document.getElementById('canvasBox');

        // 逻辑分辨率固定为 900x500
        const GAME_W = 900;
        const GAME_H = 500;
        
        let res = { food: 200, wood: 150, gold: 50 };
        let units = [];
        let buildings = [];
        let resourcesOnMap = [];
        let selectedEntity = null;
        let buildMode = false;
        let gameOver = false;
        let gameWin = false;
        let spawnTimer = 0;

        // 智能获取父级容器真实尺寸，规避0宽高灾难
        function resizeCanvas() {
            canvas.width = canvasBox.clientWidth || window.innerWidth;
            canvas.height = canvasBox.clientHeight || (window.innerHeight - 120);
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => { setTimeout(resizeCanvas, 200); });

        function getLogicalClick(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: ((clientX - rect.left) / rect.width) * GAME_W,
                y: ((clientY - rect.top) / rect.height) * GAME_H
            };
        }

            // 玩家城镇中心 (TC)
            buildings.push({ id: 'tc', type: 'TC', side: 'player', x: 100, y: 250, r: 40, hp: 1000, maxHp: 1000 });
